    <title>BUAA 课程签到</title>
    <style>
        :root {
            --theme: #3498db;
            --success: #2ecc71;
            --error: #e74c3c;
            --radius: 10px;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--theme), #2980b9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            font-size: 14px;
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 15px;
        }

        .collapse {
            background: #f7f9fc;
            border-radius: var(--radius);
            padding: 12px 15px;
            font-size: 13px;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .collapse summary {
            cursor: pointer;
            outline: none;
            font-weight: 500;
        }

        input, select, button {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e7ff;
            border-radius: var(--radius);
            font-size: 15px;
            background: rgba(255, 255, 255, 0.7);
            transition: 0.25s;
        }

        input:focus, select:focus {
            border-color: var(--theme);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        
        input::placeholder {
            color: #95a5a6;
        }
        
        .placeholder, select:invalid {
            color: #95a5a6;
        }

        button {
            border: none;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(90deg, var(--theme), #2980b9);
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.25);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .notice {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: var(--radius);
            font-size: 13px;
            text-align: center;
            opacity: 1;
            transition: 0.3s;
            background: rgba(231, 76, 60, 0.15);
            color: #c0392b;
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .btn-secondary {
            margin-top: 10px;
            background: linear-gradient(90deg, #95a5a6, #7f8c8d);
        }

        .btn-secondary.active {
            background: linear-gradient(90deg, var(--success), #27ae60);
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: var(--radius);
            font-size: 13px;
            text-align: center;
            opacity: 0;
            transition: 0.3s;
        }

        .message.show {
            opacity: 1;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.15);
            color: #27ae60;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .message.error {
            background: rgba(231, 76, 60, 0.15);
            color: #c0392b;
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        .message.initialize {
            background: transparent;
            color: transparent;
            border: 1px solid transparent;
            opacity: 0;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #95a5a6;
            margin-top: 25px;
            line-height: 1.7;
        }

        footer a {
            color: var(--theme);
            text-decoration: none;
            margin: 0 5px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px 15px;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>BUAA 课程签到</h1>
        <p class="desc">输入学号与姓名，查询今日课程并签到</p>

        <details class="collapse">
            <summary>使用方法 / 免责声明</summary>
            <p>1. 填写真实学号、姓名，点击「查询课程」。</p>
            <p>2. 选择要签到的课程，点击「签到」。</p>
            <p>3. 为保证合理使用，本工具仅查询当日课程，在课程开始前10分钟至课程结束期间允许打卡。</p>
            <p>4. 本项目仅用于个人学习和研究交流，请勿用于违反学校规定的用途。</p>
            <p>5. 使用本工具造成的一切后果由使用者自行承担。</p>
        </details>

        <div class="form-group">
            <input id="studentId" placeholder="学号" autocomplete="off">
        </div>
        <div class="form-group">
            <input id="studentName" placeholder="姓名" autocomplete="off">
        </div>
        <div class="form-group">
            <select id="ScheduleList" required>
                <option value="" disabled selected class="placeholder">请先查询课程</option>
            </select>
        </div>

        <button id="getScheduleBtn">查询课程</button>
        <button id="SignInBtn" class="btn-secondary" disabled>签到</button>

        <div id="message" class="message"></div>

        <footer>
            <div>
                <a href="https://github.com/theFool-wn" target="_blank">GitHub</a> |
                <a href="https://wangnan.net" target="_blank">HomePage</a> |
                <a href="mailto:me@wangnan.net">Email</a>
            </div>
            <div>&copy; 2025 Wang Nan. All rights reserved.</div>
            <div>参考自<a href="https://github.com/slvf/BUAA-iClassSignIn" target="_blank">Github项目</a></div>
        </footer>
    </div>

    <script>
        const studentId = document.getElementById('studentId');
        const studentName = document.getElementById('studentName');
        const schedule = document.getElementById('ScheduleList');
        const getBtn = document.getElementById('getScheduleBtn');
        const signBtn = document.getElementById('SignInBtn');
        const msg = document.getElementById('message');
        
        let userId = '';

        function showMessage(text, type = 'success') {
            msg.textContent = text;
            msg.className = `message ${type} show`;
            setTimeout(() => msg.classList.remove('show'), 5000);
        }

        showMessage('初始化成功', 'initialize');
        
        function resetAll() {
            schedule.innerHTML = '<option value="" disabled selected class="placeholder">请先查询课程</option>';
            signBtn.disabled = true;
            signBtn.classList.remove('active');
            userId = '';
        }

        function setAllDisabled() {
            studentId.disabled = true;
            studentName.disabled = true;
            schedule.disabled = true;
            
            getBtn.disabled = true;
            signBtn.disabled = true;
            getBtn.textContent = '课程查询禁用';
            signBtn.textContent = '签到禁用';
        
            const detailsElement = document.querySelector('details.collapse');
            detailsElement.style.pointerEvents = 'none';
            detailsElement.style.opacity = '0.7';
            
            document.querySelector('p.desc').outerHTML = '<p class="notice">教务接口迁移，近期不能打卡(>_<)</p>';
        }

        getBtn.addEventListener('click', async () => {
            const id = studentId.value.trim();
            const name = studentName.value.trim();
            if (!id || !name) return showMessage('请填写学号与姓名', 'error');
            getBtn.disabled = true;
            getBtn.textContent = '查询中...';
            try {
                const res = await fetch(`https://buaa.wangnan.net/api/iClassSchedule?studentId=${id}&studentName=${encodeURIComponent(name)}`);
                const data = await res.json();
                if (data.STATUS !== '0') return showMessage(data.message || '未知错误', 'error');
                const list = data.result || [];
                if (list.length === 0) return showMessage('今天没有课程，无需签到', 'success');
                userId = data.user_id || '';
                schedule.innerHTML = '<option value="" disabled selected class="placeholder">请选择课程</option>';
                list.forEach(item => {
                    const { classBeginTime, classEndTime, courseName, classroomName, teacherName, signStatus } = item;
                    const begin = classBeginTime.slice(11, 16);
                    const end = classEndTime.slice(11, 16);
                    const status = signStatus === '1' ? '已签到' : '未签到';
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify(item);
                    opt.textContent = `${begin}-${end}  ${courseName}  ${classroomName}  ${teacherName}  [${status}]`;
                    schedule.appendChild(opt);
                });
                showMessage('课程查询成功', 'success');
            } catch (e) {
                showMessage('网络请求失败', 'error');
            } finally {
                getBtn.disabled = false;
                getBtn.textContent = '查询课程';
            }
        });

        signBtn.addEventListener('click', async () => {
            const val = schedule.value;
            if (!val) return;
            signBtn.disabled = true;
            signBtn.textContent = '签到中...';
            const item = JSON.parse(val);
            item.user_id = userId;
            item.studentId = studentId.value.trim();
            
            try {
                const res = await fetch('https://buaa.wangnan.net/api/iClassSign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(item)
                });
                const data = await res.json();
                if (data.STATUS === '0') {
                    const selectedOpt = schedule.options[schedule.selectedIndex];
                    const txt = selectedOpt.textContent;
                    selectedOpt.textContent = txt.replace('[未签到]', '[已签到]');
                    showMessage('签到成功', 'success');
                } else {
                    showMessage(data.message || '签到失败', 'error');
                }
            } catch (e) {
                showMessage('网络错误', 'error');
            } finally {
                signBtn.disabled = !schedule.value;
                signBtn.textContent = '签到';
            }
        });

        schedule.addEventListener('change', () => {
            signBtn.disabled = !schedule.value;
            signBtn.classList.toggle('active', !!schedule.value);
        });
        
        studentId.addEventListener('input', resetAll);
        studentName.addEventListener('input', resetAll);

        setAllDisabled();
    </script>
</body>

</html>
