name = "buaa-iclass-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
# 可选：自定义变量

# Routes 配置 (二选一):
# 1. 如果作为独立 Worker 部署（推荐），配置路由
# 2. 如果部署到 Cloudflare Pages Functions，则不需要 routes

# 独立 Worker 路由（部署后访问 your-subdomain.workers.dev/api/*）
# 使用前请替换为你的 Cloudflare 账号域名
# route = "https://buaa-iclass.your-account.workers.dev/*"

# KV 命名空间（可选，用于缓存 session）
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "your-kv-namespace-id"
